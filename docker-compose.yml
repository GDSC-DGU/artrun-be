version: '3.8'

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: artrun-db
    environment:
      POSTGRES_DB: artrun
      POSTGRES_USER: artrun
      POSTGRES_PASSWORD: artrun
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-pgrouting.sql:/docker-entrypoint-initdb.d/init-pgrouting.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U artrun"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: artrun-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: artrun-app
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: artrun
      DB_USERNAME: artrun
      DB_PASSWORD: artrun
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SPRING_PROFILES_ACTIVE: local
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  pgdata:
  redisdata:
