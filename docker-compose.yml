services:
  db:
    image: pgrouting/pgrouting:16-3.5-4.0.1
    container_name: artrun-db
    environment:
      POSTGRES_DB: artrun
      POSTGRES_USER: artrun
      POSTGRES_PASSWORD: artrun
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-pgrouting.sql:/docker-entrypoint-initdb.d/init-pgrouting.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U artrun"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: artrun-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: artrun-app
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: artrun
      DB_USERNAME: artrun
      DB_PASSWORD: artrun
      REDIS_HOST: redis
      REDIS_PORT: 6379
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      SPRING_PROFILES_ACTIVE: local
      PYTHON_SERVICE_URL: http://python-service:8000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      python-service:
        condition: service_started

  python-service:
    build: ./python-service
    container_name: artrun-python
    ports:
      - "8001:8000"
    volumes:
      - ./python-service/output:/output

volumes:
  pgdata:
  redisdata:
